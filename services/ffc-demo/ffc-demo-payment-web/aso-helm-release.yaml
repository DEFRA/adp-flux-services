  chart:
    spec:
      chart: ffc-demo-payment-web-infra
      version: "0.0.1"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: ffc-demo-payment-web-infra
        namespace: config-cluster-flux
  install:
    createNamespace: true
  interval: 5m0s
  targetNamespace: ffc-demo
