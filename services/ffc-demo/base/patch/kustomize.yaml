apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ffc-demo-base
  namespace: config-cluster-flux
spec:
  sourceRef:
    kind: GitRepository
    name: services-repository
    namespace: config-cluster-flux
  interval: 5m
  timeout: 3m
  prune: true
  path: ./services/ffc-demo/${ENVIRONMENT}/${CLUSTER}
  postBuild:
    substitute:
      NAMESPACE: "ffc-demo"
      WORKLOAD_IDENTITY_ID: "448be6c3-8c30-4dee-a4ea-85ebe42cc1c5"
      TEAM_NAME: "ffc-demo-team-gg"
      CLIENT_ID: "4d6e3354-e963-4658-9ad7-b1cf28102083" # TEAM MI CLIENT_ID
      TEAM_RG: "sndadpinfrg1401-gg"
      ENVIRONMENT: "${ENVIRONMENT}"
      ACR_NAME: "${ACR_NAME}"
      CLUSTER: ${double_quote:="}${CLUSTER}${double_quote:="} # HELPS PARSER TO EVALUATE 01 AS STRING INSTEAD OF NUMBER. NOTE: DOESN'T WORK WITH CASCADING IN THE SUBSEQUENT STEPS. IT WILL BE EVALUATED AS NUMBER
      CLUSTER_OIDC: "${CLUSTER_OIDC}"
      TENANT_ID: "${TENANT_ID}" 
      SUBSCRIPTION_ID: "${SUBSCRIPTION_ID}"
      SUBSCRIPTION_NAME: "${SUBSCRIPTION_NAME}"
      SERVICEBUS_RG: "${SERVICEBUS_RG}"
      SERVICEBUS_NS: "${SERVICEBUS_NS}"
      INFRA_RG: "${INFRA_RG}"
      TEAM_MI_NAME: "${TEAM_MI_NAME}"
      POSTGRES_SERVER_RG: "${POSTGRES_SERVER_RG}"
      POSTGRES_SERVER: "${POSTGRES_SERVER}"