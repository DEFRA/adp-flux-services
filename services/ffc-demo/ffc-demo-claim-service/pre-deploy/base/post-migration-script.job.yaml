apiVersion: batch/v1
kind: CronJob
metadata:
  name: ffc-demo-claim-service-post-dbmigration
  namespace: ffc-demo
  labels:
    azure.workload.identity/use: "true"
spec:
  schedule: "0/2 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: ${TEAM_NAMESPACE}
          restartPolicy: OnFailure
          containers:
          - name: ffc-demo-claim-service-post-dbmigration
            imagePullPolicy: Always
