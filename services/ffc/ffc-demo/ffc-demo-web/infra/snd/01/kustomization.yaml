apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - image-policy.yaml
patches:
  - path: patch.yaml
    target:
      kind: HelmRelease
      name: ffc-demo-web-infra     
  - path: patch-post-deploy.yaml
    target:
      kind: HelmRelease
      name: ffc-demo-web-infra-post-deploy