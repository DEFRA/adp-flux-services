apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-cluster-flux
  namespace: flux-system
spec:
  sourceRef:
    kind: GitRepository
    name: services-repository
    namespace: flux-system
  interval: 5m
  timeout: 3m
  prune: true
  path: ./services/environments/snd/01
  postBuild:
    substitute:
      ENVIRONMENT: "snd"
      ACR_NAME: "sndcdoinfcr2401p"
      CLUSTER: "01"

